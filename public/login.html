<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - Origo</title>
    <link rel="stylesheet" href="/_assets/styles.css" />
    <script src="/_assets/app.js"></script>
</head>
<body>
    <nav class="site-nav">
        <div class="container">
            <h2 class="brand">序原 ORIGO</h2>
            <div class="nav-links">
                <a href="/">首页</a>
                <span id="nav-auth-slot"></span>
            </div>
        </div>
    </nav>
    <div class="container form-wrap">
        <div class="card">
            <h2>登录</h2>
            <form onsubmit="login(event)">
                <input id="username" placeholder="用户名" required />
                <input id="password" type="password" placeholder="密码" required />
                <button type="submit">登录</button>
            </form>
            <p class="muted">没有账号？<a href="/register">去注册</a></p>
        </div>
    </div>
</body>
</html>
